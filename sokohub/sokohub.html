<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SokoHub - African E-commerce Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sokohub.css">
    <link rel="preload" href="sokohub.js" as="script">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-top">
                <div class="logo">
                    <a href="index.html" aria-label="SokoHub home">
                        <img src="image.png" alt="SokoHub logo" class="site-logo">
                    </a>
                </div>
            <div class="header-icons">
                <span onclick="toggleNotifications()" style="cursor: pointer;">
                    🔔
                    <span class="notification-badge">3</span>
                </span>
                <span onclick="goToCart()" style="cursor: pointer;">🛒</span>
            </div>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search products, brands...">
            <button class="search-btn">Search</button>
        </div>
    </header>

    <!-- CATEGORIES SCROLL -->
    <div class="categories" id="categoriesScroll">
        <button class="category-chip active" onclick="filterCategory(this)">All</button>
        <button class="category-chip" onclick="filterCategory(this)">Electronics</button>
        <button class="category-chip" onclick="filterCategory(this)">Fashion</button>
        <button class="category-chip" onclick="filterCategory(this)">Food and drinks</button>
        <button class="category-chip" onclick="filterCategory(this)">house items</button>
        <button class="category-chip" onclick="filterCategory(this)">Services</button>
        <button class="category-chip" onclick="filterCategory(this)">rentals</button>
        <button class="category-chip" onclick="filterCategory(this)">Study essentials</button>
    </div>

    <!-- HERO BANNER -->
    <section class="hero">
        <h1>Mega Murang'a Deals</h1>
        <p>Making Shopping Easier</p>
        <button class="hero-btn" onclick="shopNow()">Start Shopping</button>
    </section>

    <!-- PRODUCTS SECTION -->
    <section class="products-section">
        <div class="section-title">Popular Products</div>
        <div class="products-grid" id="productsGrid">
            <!-- Products will be generated by JavaScript -->
        </div>
    </section>

    <!-- BOTTOM NAVIGATION (MOBILE) -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchNav(this, 'home')">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="switchNav(this, 'browse')">
            <span class="nav-icon">🔍</span>
            <span>Browse</span>
        </div>
        <div class="nav-item" onclick="switchNav(this, 'cart')">
            <span class="nav-icon">🛒</span>
            <span>Cart</span>
        </div>
        <div class="nav-item" onclick="switchNav(this, 'saved')">
            <span class="nav-icon">❤️</span>
            <span>Saved</span>
        </div>
        <div class="nav-item" onclick="switchNav(this, 'profile')">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </div>
    </nav>

    <!-- FOOTER -->
    <footer>
        <div class="footer-links">
            <a href="#about">About Us</a>
            <a href="#contact">Contact</a>
            <a href="#privacy">Privacy</a>
            <a href="#terms">Terms</a>
        </div>
        <p class="footer-text">&copy; 2026 SokoHub. All rights reserved. | Making Shopping Easier for Murang'a</p>
    </footer>

    <script src="sokohub.js"></script>
</body>
</html>
